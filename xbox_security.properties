# Loaded with -Djava.security.properties==... so the Xbox sandbox does not
# need to resolve the stock JRE java.security file.

security.provider.1=SUN
security.provider.2=SunRsaSign
security.provider.3=SunEC
security.provider.4=SunJSSE
security.provider.5=SunJCE
security.provider.6=SunJGSS
security.provider.7=SunSASL
security.provider.8=XMLDSig
security.provider.9=SunPCSC

# Disable FIPS/system detection that requires registry access
fips.provider.1=
fips.provider.2=

# Relax algorithm restrictions for dev
jdk.jar.disabledAlgorithms=
jdk.certpath.disabledAlgorithms=MD2, MD5
jdk.tls.disabledAlgorithms=SSLv3, RC4, DES, MD5withRSA, DH keySize < 1024

# Disable features that probe system resources
security.useSystemPropertiesFile=false
sun.security.krb5.disableReferrals=true

# Avoid the sandbox-hostile ThreadedSeedGenerator path on Xbox One.
securerandom.source=file:/dev/urandom
securerandom.strongAlgorithms=DRBG:SUN
securerandom.drbg.config=Hash_DRBG,SHA-256,128,none

keystore.type=pkcs12
keystore.type.compat=true
ssl.KeyManagerFactory.algorithm=SunX509
ssl.TrustManagerFactory.algorithm=PKIX
networkaddress.cache.ttl=60
networkaddress.cache.negative.ttl=10
